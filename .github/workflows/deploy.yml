name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 최소 권한.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 겹치지 않게 하나만 진행(진행 중 배포는 취소하지 않음).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Pages 사이트가 아직 없으면 워크플로가 직접 활성화한다(수동 Settings 클릭 불요).
          # 단, private 레포는 무료 플랜에서 Pages 불가 — 레포를 public으로 전환해야 동작.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
